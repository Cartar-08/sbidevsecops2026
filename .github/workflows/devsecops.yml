name: EMS DevSecOps Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  devsecops:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # ✅ FIX 1: pass JWT properly + avoid CI crash
    - name: Build and test
      run: mvn clean verify -DskipTests
      env:
        JWT_SECRET: ${{ secrets.JWT_SECRET_TEST }}

    # ✔ SAST
    - name: SAST — Sonar scan
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        mvn sonar:sonar \
          -Dsonar.projectKey=sbi-ems \
          -Dsonar.organization=vaman-pundit \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.token=$SONAR_TOKEN

    # ✔ Docker build
    - name: Build Docker image
      run: docker build -t sbi-ems:${{ github.sha }} .

    # ✔ FIX 2: correct port mapping
    - name: Start EMS container
      run: |
        docker run -d --name ems-dast \
          -p 8090:8090 \
          -e JWT_SECRET=${{ secrets.JWT_SECRET_TEST }} \
          sbi-ems:${{ github.sha }}

        echo "Waiting for app..."
        for i in $(seq 1 30); do
          if curl -sf http://localhost:8090/actuator/health; then
            echo "App ready"
            break
          fi
          sleep 5
        done

    # ✔ DAST
    - name: OWASP ZAP scan
      run: |
        docker run --network=host ghcr.io/zaproxy/zaproxy:stable \
          zap-api-scan.py \
          -t http://localhost:8090/v3/api-docs \
          -f openapi \
          -r zap-report.html \
          -I
      continue-on-error: true

    - name: Upload report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: zap-report
        path: zap-report.html

    - name: Stop container
      if: always()
      run: docker stop ems-dast || true